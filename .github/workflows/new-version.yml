name: New version

# Triggered by a new release of the jodit/application library (it sends a
# `newversion` repository_dispatch). Bump the version and push a tag with a PAT
# (not GITHUB_TOKEN) so the tag triggers the existing build-and-deploy workflow
# (main.yml, on: push tags). The Docker build runs `composer install` with no
# committed lock (composer.lock is gitignored), so it resolves jodit/application
# fresh and picks up the new release automatically — no `composer update` here.

on:
  workflow_dispatch:
  repository_dispatch:
    types: [newversion]

jobs:
  newversion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "New version $VERSION"
          git tag "$VERSION"

      - name: Push version + tag (PAT so the tag triggers main.yml)
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          branch: master
          tags: true
